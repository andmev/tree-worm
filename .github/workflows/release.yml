name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.npm-pkg }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            npm-pkg: cli-darwin-arm64
            binary: tree-worm
            asset: tree-worm-darwin-arm64

          - target: x86_64-apple-darwin
            runner: macos-14
            npm-pkg: cli-darwin-x64
            binary: tree-worm
            asset: tree-worm-darwin-x64

          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-pkg: cli-linux-x64
            binary: tree-worm
            asset: tree-worm-linux-x64

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-pkg: cli-linux-arm64
            binary: tree-worm
            asset: tree-worm-linux-arm64
            cross: true

          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            npm-pkg: cli-linux-x64-musl
            binary: tree-worm
            asset: tree-worm-linux-x64-musl
            cross: true

          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            npm-pkg: cli-win32-x64
            binary: tree-worm.exe
            asset: tree-worm-win32-x64.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to npm package
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} npm/${{ matrix.npm-pkg }}/${{ matrix.binary }}

      - name: Upload npm artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.npm-pkg }}
          path: npm/${{ matrix.npm-pkg }}/

      - name: Upload release binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  publish:
    name: Publish & Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          # Update version in all package.json files
          for pkg in npm/cli-*/package.json npm/tree-worm/package.json; do
            jq --arg v "$VERSION" '.version = $v' "$pkg" > tmp.json && mv tmp.json "$pkg"
          done

          # Update optionalDependencies versions in root package
          jq --arg v "$VERSION" '
            .optionalDependencies |= with_entries(.value = $v)
          ' npm/tree-worm/package.json > tmp.json && mv tmp.json npm/tree-worm/package.json

      - name: Prepare platform packages
        run: |
          for dir in artifacts/cli-*; do
            pkg=$(basename "$dir")
            # Copy only the binary, not package.json (which has stale version)
            for file in "$dir"/*; do
              [ "$(basename "$file")" = "package.json" ] && continue
              cp "$file" "npm/$pkg/"
            done
            chmod +x "npm/$pkg/tree-worm" 2>/dev/null || true
          done

      - name: Publish platform packages to npm
        run: |
          for dir in npm/cli-*; do
            echo "Publishing $(basename $dir)..."
            cd "$dir"
            npm pkg fix
            out=$(npm publish --access public --provenance 2>&1)
            exit_code=$?
            echo "$out"
            if [ $exit_code -ne 0 ]; then
              echo "$out" | grep -qE 'cannot publish over|already exists' \
                && echo "WARN: $(basename $dir) already at this version, skipping" \
                || echo "WARN: $(basename $dir) publish failed (will not block release)"
            fi
            cd ..
          done

      - name: Publish root package to npm
        run: |
          cd npm/tree-worm
          npm pkg fix
          for attempt in 1 2 3; do
            out=$(npm publish --access public --provenance 2>&1)
            exit_code=$?
            echo "$out"
            [ $exit_code -eq 0 ] && break
            echo "$out" | grep -qE 'cannot publish over|already exists' && { echo "Already published at this version, skipping"; break; }
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to publish tree-worm after 3 attempts"
              exit 1
            fi
            echo "Attempt $attempt failed, waiting 15s for registry to settle..."
            sleep 15
          done

      - name: Generate release notes from commits
        id: notes
        run: |
          # Get commits since previous tag (or all commits if first tag)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi

          # Write to file for the release step
          {
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "## Installation"
            echo ""
            echo '```bash'
            echo "npx tree-worm"
            echo '```'
            echo ""
            echo "Or download a binary from the assets below."
          } > release-notes.md

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/tree-worm-*; do
            name=$(basename "$dir")
            # Find the binary inside the artifact directory
            file=$(find "$dir" -type f | head -1)
            cp "$file" "release-assets/$name"
            chmod +x "release-assets/$name" 2>/dev/null || true
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: release-assets/*
